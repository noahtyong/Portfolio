<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Noah Yong — MechE @ UWaterloo</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><circle cx='16' cy='16' r='12' fill='%234A8FD4'/></svg>">
<link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Azeret+Mono:wght@300;400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --amber: #4A8FD4;
    --amber-dim: #2a6099;
    --amber-glow: rgba(74,143,212,0.12);
    --bg: #0b0f14;
    --bg2: #111720;
    --bg3: #161d27;
    --line: rgba(74,143,212,0.2);
    --line-faint: rgba(255,255,255,0.05);
    --text: #e8e0d0;
    --text-muted: #a0a8b0;
  }

  .hidden { display: none !important; }
  .view-section { animation: fadeIn 0.4s ease-out; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; line-height: 1.6; overflow-x: hidden; }
  .container { max-width: 1100px; margin: 0 auto; padding: 0 40px; }
  
  nav { position: fixed; top: 0; width: 100%; z-index: 1000; padding: 20px 0; background: rgba(11,15,20,0.8); backdrop-filter: blur(10px); border-bottom: 1px solid var(--line-faint); }
  .nav-content { display: flex; justify-content: space-between; align-items: center; }
  .nav-links a { margin-left: 30px; text-decoration: none; color: var(--text-muted); font-family: 'Azeret Mono', monospace; font-size: 0.8rem; text-transform: uppercase; cursor: pointer; transition: 0.2s; }
  .nav-links a:hover { color: var(--amber); }
  
  .projects-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 30px; margin-top: 40px; }
  .project-card { background: var(--bg2); border: 1px solid var(--line-faint); padding: 30px; border-radius: 4px; transition: 0.3s; cursor: pointer; position: relative; }
  .project-card:hover { border-color: var(--amber); transform: translateY(-5px); }
  .project-tag { font-family: 'Azeret Mono', monospace; color: var(--amber); font-size: 0.7rem; margin-bottom: 10px; display: block; }
  
  .detail-header { padding-top: 150px; margin-bottom: 50px; }
  .detail-gallery img { width: 100%; border-radius: 8px; margin-bottom: 20px; border: 1px solid var(--line-faint); }
  .back-btn { color: var(--amber); text-decoration: none; font-family: 'Azeret Mono', monospace; margin-bottom: 20px; display: inline-block; cursor: pointer; }
  
  .btn-ghost { padding: 12px 24px; border: 1px solid var(--amber); color: var(--amber); background: transparent; cursor: pointer; font-family: 'Azeret Mono', monospace; font-size: 0.8rem; transition: 0.3s; }
  .btn-ghost:hover { background: var(--amber-glow); }
</style>
</head>
<body>

<nav>
  <div class="container nav-content">
    <div class="logo" onclick="showHome()" style="cursor:pointer; font-family: 'Archivo Black';">NOAH YONG</div>
    <div class="nav-links">
      <a onclick="showHome()">Home</a>
      <a onclick="showWorks()">Works</a>
      <a href="#contact">Contact</a>
    </div>
  </div>
</nav>

<div id="home-view" class="view-section">
  <section class="hero" style="padding: 180px 0 100px;">
    <div class="container">
      <h1 style="font-family: 'Archivo Black', sans-serif; font-size: 4rem; line-height: 1;">NoahYong</h1>
      <p style="max-width: 600px; margin-top: 20px; color: var(--text-muted);">First-year Mechanical Engineering student at UWaterloo with hands-on experience in machining, rapid prototyping, and CAD.</p>
    </div>
  </section>

  <section id="projects">
    <div class="container">
      <h2>Selected Projects</h2>
      <div id="featured-grid" class="projects-grid"></div>
      <div style="text-align: center; margin-top: 50px;">
        <button onclick="showWorks()" class="btn-ghost">See more of my work &rarr;</button>
      </div>
    </div>
  </section>
</div>

<div id="works-view" class="view-section hidden">
  <section style="padding: 150px 0;">
    <div class="container">
      <a onclick="showHome()" class="back-btn">&larr; BACK TO HOME</a>
      <h2 style="font-family: 'Archivo Black', sans-serif; font-size: 3rem;">Full Portfolio</h2>
      <div id="all-works-grid" class="projects-grid"></div>
    </div>
  </section>
</div>

<div id="detail-view" class="view-section hidden">
  <div class="container">
    <div class="detail-header">
      <a onclick="showWorks()" class="back-btn">&larr; BACK TO WORKS</a>
      <h1 id="detail-title" style="font-family: 'Archivo Black', sans-serif; font-size: 3.5rem;"></h1>
      <p id="detail-tags" style="font-family: 'Azeret Mono', monospace; color: var(--amber); margin: 20px 0;"></p>
      <div id="detail-description" style="max-width: 800px; font-size: 1.1rem; color: var(--text-muted); margin-bottom: 40px; white-space: pre-wrap;"></div>
      <div id="detail-gallery" class="detail-gallery"></div>
    </div>
  </div>
</div>

<script>
  const projectDatabase = {
    'tt-motor': {
      title: 'TT Motor Dynamometer',
      tags: 'Mechanical Design • MATLAB • Testing',
      summary: 'Custom dynamometer built to find stall torque of a TT motor.',
      description: 'The team was provided with metal beams, plastic connectors, and a TT motor. We built a system where a string draped over a wheel powered by the motor lifted a basket of weights. This allowed us to calculate performance rigour and solve design problems through diverse team input.',
      images: ['assets/tt-motor-top.jpg', 'assets/tt-motor-side.jpg']
    },
    'waterloo-rocketry': {
      title: 'Waterloo Rocketry',
      tags: 'Propulsion • SolidWorks • Water Jet',
      summary: 'Propulsion subteam member focusing on design for manufacturing.',
      description: 'Designed drawer dividers and fittings for propulsion organization. Optimized the design for manufacturing using sheet metal and water jet cutting, reducing CAD time and increasing structural robustness.',
      images: ['assets/rocketry-cad.png', 'assets/rocketry-real.jpg']
    },
    'cad-collection': {
      title: 'Coursework CAD Collection',
      tags: 'SolidWorks • AutoCAD • GD&T',
      summary: 'Engineering drawings and assembly models for mechanical parts.',
      description: 'A series of high-precision models including a keychain assembly, brake balance clevis, and trunnion parts. Focused on industry standards for tolerancing and manufacturing drawings.',
      images: ['assets/cad-keychain.png']
    },
    'model-rocket': {
      title: 'Model Rocket Competition',
      tags: 'Aerospace • Simulation • OpenRocket',
      summary: 'Design and launch of a plywood rocket on an A8-0 engine.',
      description: 'Simulated flight performance in OpenRocket before physical fabrication. The project served as a critical lesson in how minor fabrication errors (fin geometry) impact flight stability.',
      images: ['assets/rocket-model.jpg']
    },
    'toy-cannon': {
      title: 'Toy Cannon Project',
      tags: 'Prototyping • Rapid Prototyping',
      summary: 'Final rough prototype for a mechanical toy project.',
      description: 'Focused on the iterative prototyping process, moving from initial sketches to a functional rough model to test mechanical release and firing constraints.',
      images: ['assets/cannon-proto.jpg']
    },
    'arduino-case': {
      title: 'Printed Arduino Case',
      tags: '3D Printing • Personal Project • SolidWorks',
      summary: 'Custom enclosure for electronics organization.',
      description: 'Designed in SolidWorks to learn specific CAD shortcuts and shop tolerances, then realized through FDM 3D printing.',
      images: ['assets/arduino-case.jpg']
    }
  };

  function showHome() {
    document.getElementById('home-view').classList.remove('hidden');
    document.getElementById('works-view').classList.add('hidden');
    document.getElementById('detail-view').classList.add('hidden');
    window.scrollTo(0,0);
  }

  function showWorks() {
    document.getElementById('home-view').classList.add('hidden');
    document.getElementById('works-view').classList.remove('hidden');
    document.getElementById('detail-view').classList.add('hidden');
    window.scrollTo(0,0);
  }

  function showProject(id) {
    const p = projectDatabase[id];
    document.getElementById('detail-title').innerText = p.title;
    document.getElementById('detail-tags').innerText = p.tags;
    document.getElementById('detail-description').innerText = p.description;
    const gallery = document.getElementById('detail-gallery');
    gallery.innerHTML = p.images.map(src => `<img src="${src}" alt="${p.title}">`).join('');
    document.getElementById('home-view').classList.add('hidden');
    document.getElementById('works-view').classList.add('hidden');
    document.getElementById('detail-view').classList.remove('hidden');
    window.scrollTo(0,0);
  }

  function init() {
    const featuredKeys = ['tt-motor', 'waterloo-rocketry', 'cad-collection', 'model-rocket'];
    const featuredGrid = document.getElementById('featured-grid');
    const allGrid = document.getElementById('all-works-grid');

    Object.keys(projectDatabase).forEach(key => {
      const p = projectDatabase[key];
      const card = `
        <div class="project-card" onclick="showProject('${key}')">
          <span class="project-tag">${p.tags}</span>
          <h3>${p.title}</h3>
          <p style="font-size: 0.85rem; color: var(--text-muted); margin-top: 10px;">${p.summary}</p>
        </div>
      `;
      allGrid.innerHTML += card;
      if (featuredKeys.includes(key)) featuredGrid.innerHTML += card;
    });
  }

  init();
</script>
</body>
</html>
